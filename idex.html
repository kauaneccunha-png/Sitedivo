<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Visual de Redes para Automação</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --bg-color: #ecf0f1;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Estilo das Abas */
        .tab {
            overflow: hidden;
            background-color: var(--secondary-color);
            display: flex;
            justify-content: center;
        }

        .tab button {
            background-color: inherit;
            color: white;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 30px;
            transition: 0.3s;
            font-size: 16px;
            font-weight: bold;
        }

        .tab button:hover {
            background-color: var(--accent-color);
        }

        .tab button.active {
            background-color: var(--accent-color);
        }

        .tabcontent {
            display: none;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeEffect 0.5s;
        }

        @keyframes fadeEffect {
            from {opacity: 0;}
            to {opacity: 1;}
        }
